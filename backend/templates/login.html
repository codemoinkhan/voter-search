<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voter Search Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

/* Login Card */

.login-container{
    width:100%;
    max-width:380px;
    padding:40px 30px;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    color:white;
    margin-bottom:20px;
}

.login-container h2{
    text-align:center;
    margin-bottom:30px;
    font-weight:600;
}

/* Form */

form{
    width:100%;
}

label{
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:20px;
    border:none;
    border-radius:8px;
    outline:none;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:14px;
}

input::placeholder{
    color:#eee;
}

input:focus{
    background:rgba(255,255,255,0.3);
}

/* Button */

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:white;
    color:#764ba2;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Footer */

.footer{
    text-align:center;
    color:white;
    font-size:13px;
    margin-top:10px;
    opacity:0.8;
}

/* Responsive */

@media(max-width:500px){
    .login-container{
        margin:20px;
        padding:30px 20px;
    }
}

</style>
</head>

<body>

<div class="login-container">

<h2>Voter Search Login</h2>

<form method="post">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username" placeholder="Enter your username">

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password">

    <button type="submit">Login</button>

</form>

</div>

<!-- Footer -->
<div class="footer">
    &copy; Moin Khan 2026, For Digital Solutions contact: <a href="mailto:code.moinkhan@gmail.com" style="color:white; text-decoration:underline;">code.moinkhan@gmail.com</a>
</div>

</body>
</html>
